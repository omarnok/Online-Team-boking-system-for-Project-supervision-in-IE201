<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Consultation Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📅 Project Consultation Scheduler</span>
            <a href="professor.html" class="btn btn-outline-light btn-sm">Professor Login</a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Team Identification -->
        <div class="card mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0">Step 1: Identify Your Team</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Section Number (x)</label>
                        <input type="number" id="sectionNum" class="form-control" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Team Number (y)</label>
                        <input type="number" id="teamNum" class="form-control" min="1" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Team Email</label>
                        <input type="email" id="teamEmail" class="form-control" placeholder="team@university.edu">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button onclick="identifyTeam()" class="btn btn-primary w-100">Confirm</button>
                    </div>
                </div>
                <div id="teamDisplay" class="mt-2 fw-bold text-success"></div>
            </div>
        </div>

        <!-- Booking Interface -->
        <div id="bookingPanel" class="d-none">
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Step 2: Choose Professor & Date</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Professor</label>
                            <select id="profSelect" class="form-select" onchange="loadSlots()">
                                <option value="">Select Professor</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date</label>
                            <input type="date" id="dateSelect" class="form-control" onchange="loadSlots()">
                        </div>
                    </div>
                </div>
            </div>

            <div id="slotsContainer" class="row g-3"></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Team: <span id="modalTeam" class="fw-bold"></span></p>
                    <p>Time: <span id="modalTime"></span></p>
                    <p>Type: <span id="modalType"></span></p>
                    <div id="duplicateWarning" class="alert alert-warning d-none">
                        ⚠️ You already have a booking with this professor on this day. 
                        This request will be sent for professor approval.
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="confirmBooking()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
