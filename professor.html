<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">????? Professor Dashboard</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Team Portal</a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Login -->
        <div id="loginPanel" class="card mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <h5 class="card-title">Professor Login</h5>
                <select id="loginProf" class="form-select mb-3">
                    <option value="">Select your name</option>
                </select>
                <input type="password" id="loginPin" class="form-control mb-3" placeholder="4-digit PIN" maxlength="4">
                <button onclick="profLogin()" class="btn btn-dark w-100">Login</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardPanel" class="d-none">
            <div class="row">
                <div class="col-md-4">
                    <div class="card mb-3">
                        <div class="card-header">Add Availability</div>
                        <div class="card-body">
                            <label class="form-label">Date</label>
                            <input type="date" id="availDate" class="form-control mb-2">
                            <label class="form-label">Type</label>
                            <select id="availType" class="form-select mb-2">
                                <option value="in-person">In-Person</option>
                                <option value="online">Online</option>
                            </select>
                            <label class="form-label">Start Time</label>
                            <input type="time" id="availStart" class="form-control mb-2">
                            <label class="form-label">End Time</label>
                            <input type="time" id="availEnd" class="form-control mb-2">
                            <label class="form-label">Location/Link</label>
                            <input type="text" id="availLoc" class="form-control mb-2" placeholder="Room 101 or Zoom URL">
                            <button onclick="addAvailability()" class="btn btn-success w-100">Generate Slots</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <ul class="nav nav-tabs" id="profTabs">
                        <li class="nav-item">
                            <button class="nav-link active" onclick="showTab('tabSlots')">My Slots</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" onclick="showTab('tabPending')">Pending Approvals</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" onclick="showTab('tabWaiting')">Waiting Lists</button>
                        </li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div id="tabSlots" class="tab-pane active">
                            <div id="profSlots" class="row g-2"></div>
                        </div>
                        <div id="tabPending" class="tab-pane d-none">
                            <div id="pendingList" class="list-group"></div>
                        </div>
                        <div id="tabWaiting" class="tab-pane d-none">
                            <div id="waitingList" class="list-group"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
