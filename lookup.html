<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookup Booking & Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-info">
        <div class="container">
            <span class="navbar-brand mb-0 h1">?? Booking Lookup & Feedback</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">? Back to Booking</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-header">
                <h5>Find Your Team</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="number" id="lookupSection" class="form-control" placeholder="Section" min="1">
                    </div>
                    <div class="col-md-4">
                        <input type="number" id="lookupTeam" class="form-control" placeholder="Team" min="1">
                    </div>
                    <div class="col-md-4">
                        <button onclick="lookupTeam()" class="btn btn-info w-100">Search</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="lookupResult"></div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Submit Feedback</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="feedbackResId">
                    <input type="hidden" id="feedbackProfId">
                    <input type="hidden" id="feedbackSlotId">
                    
                    <div class="form-group mb-3">
                        <label>Rating</label>
                        <select id="feedbackRating" class="form-select">
                            <option value="">Select...</option>
                            <option value="5">????? Excellent</option>
                            <option value="4">???? Very Good</option>
                            <option value="3">??? Good</option>
                            <option value="2">?? Fair</option>
                            <option value="1">? Poor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Comments</label>
                        <textarea id="feedbackText" class="form-control" rows="4" placeholder="Your feedback..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitFeedback()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
